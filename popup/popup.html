<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极客百宝箱</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="app-wrapper" id="appWrapper">
    <!-- 主页视图 -->
    <div class="view-home" id="viewHome">
      <div class="container">
        <div class="home-header">
          <h1>极客百宝箱</h1>
          <div class="header-actions">
            <div class="gear-menu-wrapper" id="gearMenuWrapper">
              <button class="gear-btn" id="gearBtn" title="全局设置">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"></circle>
                  <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
                  </path>
                </svg>
              </button>
              <div class="gear-dropdown" id="gearDropdown">
                <div class="gear-dropdown-item">
                  <span>扩展状态</span>
                  <button id="globalToggle" class="btn btn-small btn-primary">已启用</button>
                </div>
                <div class="gear-dropdown-divider"></div>
                <div class="gear-dropdown-item">
                  <span>数据管理</span>
                  <div style="display: flex; gap: 6px;">
                    <button id="exportDataBtn" class="btn btn-small btn-secondary">导出</button>
                    <button id="importDataBtn" class="btn btn-small btn-secondary">导入</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 模块区域（可滚动、可拖拽排序） -->
        <div class="modules-container" id="modulesContainer">
          <!-- 密码显示功能区域 -->
          <div class="feature-module" data-module-id="password" draggable="true">
            <div class="module-header">
              <div class="module-header-left">
                <span class="drag-handle" title="拖拽排序">⠿</span>
                <h2>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: #007aff; margin-right: 6px;">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                  密码显示
                </h2>
              </div>
              <label class="switch" onclick="event.stopPropagation()">
                <input type="checkbox" id="passwordModuleEnabled" checked>
                <span class="slider"></span>
              </label>
            </div>

            <div class="module-content" id="passwordModuleContent">
              <div class="setting-item">
                <button id="togglePassword" class="btn btn-primary btn-block">
                  <span id="toggleText">显示所有密码</span>
                </button>
              </div>
              <p class="hint">双击密码框或点击眼睛图标可单独切换</p>
            </div>
          </div>

          <!-- 凭证管理功能区域 -->
          <div class="feature-module clickable-module" data-module-id="credential" draggable="true"
            id="credentialModuleEntry">
            <div class="module-header" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">
              <div class="module-header-left">
                <span class="drag-handle" title="拖拽排序">⠿</span>
                <h2>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: #ff9500; margin-right: 6px;">
                    <path
                      d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4">
                    </path>
                  </svg>
                  凭证管理
                </h2>
              </div>
              <div class="module-header-right">
                <span class="enter-icon">›</span>
                <label class="switch" onclick="event.stopPropagation()">
                  <input type="checkbox" id="credentialModuleEnabled" checked>
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>

          <!-- MasterGo 导航模块 -->
          <div class="feature-module clickable-module" data-module-id="masterGoNav" draggable="true"
            id="masterGoNavModuleEntry">
            <div class="module-header" style="margin-bottom: 0; border-bottom: none; padding-bottom: 0;">
              <div class="module-header-left">
                <span class="drag-handle" title="拖拽排序">⠿</span>
                <h2>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: #5856d6; margin-right: 6px;">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                  </svg>
                  MasterGo 导航
                </h2>
              </div>
              <div class="module-header-right">
                <span class="enter-icon">›</span>
                <label class="switch" onclick="event.stopPropagation()">
                  <input type="checkbox" id="masterGoNavModuleEnabled" checked>
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="footer">
          <p class="version">v1.0.0</p>
        </div>
      </div>
    </div>

    <!-- 子页面视图 -->
    <div class="view-subpage" id="viewSubpage">
      <div class="subpage-header">
        <button id="subpageBackBtn" class="back-btn">
          <span style="font-size: 18px; margin-right: 4px; line-height: 1;">‹</span> 返回
        </button>
        <h2 id="subpageTitle">标题</h2>
        <div style="width: 50px;"></div> <!-- 占位符以居中标题 -->
      </div>
      <div class="subpage-content" id="credentialModuleContent">
        <!-- 由 CredentialManager.js 动态渲染 -->
      </div>
      <div class="subpage-content" id="masterGoNavModuleContent" style="display:none;">
        <!-- 由 MasterGoManager.js 动态渲染 -->
      </div>
    </div>
  </div>

  <script src="../shared/Toast.js"></script>
  <script src="modules/BaseModule.js"></script>
  <script src="modules/PasswordToggle.js"></script>
  <script src="modules/CredentialManager.js"></script>
  <script src="modules/MasterGoManager.js"></script>
  <script src="popup.js"></script>
</body>

</html>
