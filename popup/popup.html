<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码查看助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>密码查看助手</h1>
    
    <!-- 全局设置区域 -->
    <div class="global-section">
      <h2>全局设置</h2>
      <div class="setting-item">
        <span>扩展状态</span>
        <button id="globalToggle" class="btn btn-small btn-primary">
          <span id="globalToggleText">已启用</span>
        </button>
      </div>
      <div class="setting-item" style="margin-top: 10px;">
        <span>数据管理</span>
        <div style="display: flex; gap: 6px;">
          <button id="exportDataBtn" class="btn btn-small btn-secondary">导出</button>
          <button id="importDataBtn" class="btn btn-small btn-secondary">导入</button>
        </div>
      </div>
      <p class="hint">关闭后所有功能将在本网站禁用</p>
    </div>

    <!-- 模块区域（可滚动、可拖拽排序） -->
    <div class="modules-container" id="modulesContainer">
      <!-- 密码显示功能区域 -->
      <div class="feature-module" data-module-id="password" draggable="true">
        <div class="module-header">
          <div class="module-header-left">
            <span class="drag-handle" title="拖拽排序">⠿</span>
            <h2>🔐 密码显示</h2>
          </div>
          <label class="switch">
            <input type="checkbox" id="passwordModuleEnabled" checked>
            <span class="slider"></span>
          </label>
        </div>
        
        <div class="module-content" id="passwordModuleContent">
          <div class="setting-item">
            <button id="togglePassword" class="btn btn-primary btn-block">
              <span id="toggleText">显示所有密码</span>
            </button>
          </div>
          
          <p class="hint">双击密码框或点击眼睛图标可单独切换</p>
        </div>
      </div>

      <!-- 凭证管理功能区域 -->
      <div class="feature-module" data-module-id="credential" draggable="true">
        <div class="module-header">
          <div class="module-header-left">
            <span class="drag-handle" title="拖拽排序">⠿</span>
            <h2>🔑 凭证管理</h2>
          </div>
          <label class="switch">
            <input type="checkbox" id="credentialModuleEnabled" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="module-content" id="credentialModuleContent">
          <!-- 由 CredentialManager.js 动态渲染 -->
        </div>
      </div>
    </div>

    <div class="footer">
      <p class="version">v1.0.0</p>
    </div>
  </div>
  
  <script src="utils/Toast.js"></script>
  <script src="modules/BaseModule.js"></script>
  <script src="modules/PasswordToggle.js"></script>
  <script src="modules/CredentialManager.js"></script>
  <script src="popup.js"></script>
</body>
</html>
