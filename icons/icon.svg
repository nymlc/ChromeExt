  <!-- 密码点装饰 -->
  <g opacity="0.3">
    <circle cx="30" cy="90" r="3" fill="white"/>
    <circle cx="45" cy="90" r="3" fill="white"/>
    <circle cx="60" cy="90" r="3" fill="white"/>
    <circle cx="75" cy="90" r="3" fill="white"/>
    <circle cx="90" cy="90" r="3" fill="white"/>
